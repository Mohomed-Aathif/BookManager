<h2>Book Form</h2>

<div *ngIf="message" class="success-message">
  {{message}}
</div>

<form (ngSubmit)="saveBook()">

  <div>
    <label>Title</label><br>
    <input type="text" [(ngModel)]="book.title" name="title" required>
  </div>

  <div>
    <label>Author</label><br>
    <input type="text" [(ngModel)]="book.author" name="author" required>
  </div>

  <div>
    <label>ISBN</label><br>
    <input type="text" [(ngModel)]="book.isbn" name="isbn">
  </div>

  <div>
    <label>Publication Date</label><br>
    <input type="date" [(ngModel)]="book.publicationDate" name="publicationDate">
  </div>

  <br>

  <button type="submit">Save Book</button>

</form>
